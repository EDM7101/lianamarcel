<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malbrett</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #111113;
  --panel: #1a1a1f;
  --border: #2e2e36;
  --accent: #a78bfa;
  --glow: rgba(167,139,250,.22);
  --pink: #f472b6;
  --green: #34d399;
  --text: #eeeae4;
  --muted: #55555e;
  --canvas-bg: #fefcf8;
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  display: flex; flex-direction: column;
}

/* ══════════════ LOBBY ══════════════ */
#lobby {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 999;
  transition: opacity .5s ease;
}
#lobby.hidden { opacity: 0; pointer-events: none; }
#lobby::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 44px 44px;
  mask-image: radial-gradient(ellipse 55% 55% at 50% 50%, black, transparent);
  opacity: .4;
}
.lg {
  position: absolute;
  width: 520px; height: 520px;
  background: radial-gradient(circle, var(--glow), transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  animation: breathe 5s ease-in-out infinite;
  pointer-events: none;
}
@keyframes breathe {
  0%,100% { transform: translate(-50%,-50%) scale(1); opacity:.9; }
  50% { transform: translate(-50%,-50%) scale(1.15); opacity:.4; }
}
.li {
  position: relative;
  display: flex; flex-direction: column;
  align-items: center;
}
.lt {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: clamp(54px, 10vw, 90px);
  letter-spacing: -3px; line-height: 1;
}
.lt span { color: var(--accent); }
.ls {
  font-size: 11px; letter-spacing: 4px;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 44px;
}
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 18px; padding: 30px;
  width: 420px; max-width: 95vw;
  display: flex; flex-direction: column; gap: 15px;
  box-shadow: 0 32px 64px rgba(0,0,0,.5);
}
.fl { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
input[type=text] {
  width: 100%; background: rgba(255,255,255,.04);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 11px 14px; color: var(--text);
  font-family: 'JetBrains Mono', monospace; font-size: 14px;
  outline: none; transition: border-color .2s, box-shadow .2s;
}
input[type=text]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--glow);
}
input[type=text]::placeholder { color: var(--muted); }
.bm {
  width: 100%; padding: 13px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 11px;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px;
  cursor: pointer; transition: all .2s; letter-spacing: .3px;
}
.bm:hover { background: #b8a0fc; box-shadow: 0 6px 24px var(--glow); transform: translateY(-1px); }
.bm:active { transform: translateY(0); }
.div-line {
  display: flex; align-items: center; gap: 10px;
  color: var(--muted); font-size: 10px;
}
.div-line::before, .div-line::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.jr { display: flex; gap: 8px; }
.jr input { flex: 1; letter-spacing: 4px; text-transform: uppercase; font-size: 16px; text-align: center; }
.bj {
  background: transparent; border: 1px solid var(--border);
  color: var(--text); border-radius: 10px; padding: 0 16px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  cursor: pointer; white-space: nowrap; transition: all .2s;
}
.bj:hover { border-color: var(--accent); color: var(--accent); }
#lst { min-height: 18px; text-align: center; font-size: 11px; color: var(--muted); transition: color .2s; }
#lst.err { color: var(--pink); }
#lst.ok { color: var(--green); }

/* ══════════════ APP ══════════════ */
#app { display: none; flex-direction: column; height: 100vh; }
#app.v { display: flex; }

#bar {
  height: 46px; flex-shrink: 0;
  background: var(--panel); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 12px; gap: 12px;
}
.blogo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; letter-spacing: -1px; }
.blogo span { color: var(--accent); }
.vsep { width: 1px; height: 20px; background: var(--border); }
.pill {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; padding: 4px 10px; border-radius: 20px;
  background: rgba(255,255,255,.04); border: 1px solid var(--border);
}
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: all .3s; }
.dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot.wt { background: #f59e0b; box-shadow: 0 0 6px #f59e0b; animation: blink 1.2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.br { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.bb {
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); border-radius: 8px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  padding: 5px 10px; cursor: pointer; transition: all .15s;
}
.bb:hover { border-color: var(--accent); color: var(--text); }
.cp {
  display: flex; align-items: center; gap: 6px;
  background: var(--glow); border: 1px solid rgba(167,139,250,.3);
  border-radius: 8px; padding: 5px 12px;
  font-size: 12px; letter-spacing: 3px; color: var(--accent);
  cursor: pointer; transition: background .2s;
}
.cp:hover { background: rgba(167,139,250,.35); }

/* workspace */
#ws { display: flex; flex: 1; overflow: hidden; min-height: 0; }

/* toolbar */
#tb {
  width: 56px; flex-shrink: 0;
  background: var(--panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 0; gap: 2px; overflow-y: auto;
}
.tbtn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px; border: 1px solid transparent;
  background: transparent; cursor: pointer; color: var(--muted); font-size: 17px;
  transition: all .12s;
}
.tbtn:hover { background: rgba(255,255,255,.06); color: var(--text); }
.tbtn.on { background: rgba(167,139,250,.15); border-color: rgba(167,139,250,.4); color: var(--accent); }
.tsep { width: 30px; height: 1px; background: var(--border); margin: 4px 0; }

/* swatches */
.sw {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid transparent; cursor: pointer;
  transition: transform .12s, border-color .12s; flex-shrink: 0;
}
.sw:hover { transform: scale(1.2); }
.sw.on { border-color: #fff; transform: scale(1.1); }
input[type=color] {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid var(--border); padding: 0;
  cursor: pointer; background: none; overflow: hidden; margin-top: 2px;
}

/* size */
.szw { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 6px 0; }
.szn { font-size: 9px; color: var(--muted); }
input[type=range] {
  -webkit-appearance: none; appearance: none;
  writing-mode: vertical-lr; direction: rtl;
  width: 4px; height: 72px; background: var(--border);
  border-radius: 2px; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 13px; height: 13px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 5px var(--glow);
}

/* canvas area */
#cbox { flex: 1; position: relative; overflow: hidden; background: #ccc; }
canvas { position: absolute; top: 0; left: 0; display: block; }
#mc { background: var(--canvas-bg); z-index: 1; cursor: crosshair; }
#cc { pointer-events: none; z-index: 2; }

/* wait overlay — pointer-events NONE = canvas works underneath */
#wo {
  position: absolute; inset: 0;
  background: rgba(17,17,19,.85); backdrop-filter: blur(8px);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 18px; z-index: 10;
  transition: opacity .4s;
}
#wo.gone { opacity: 0; pointer-events: none; }
.wt2 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; }
.bc {
  font-size: 36px; letter-spacing: 10px; color: var(--accent);
  background: rgba(167,139,250,.12); border: 1px solid rgba(167,139,250,.3);
  border-radius: 14px; padding: 14px 28px; cursor: pointer;
  transition: background .2s; font-family: 'JetBrains Mono', monospace;
}
.bc:hover { background: rgba(167,139,250,.22); }
.wh { color: var(--muted); font-size: 11px; text-align: center; line-height: 2; }
.spin {
  width: 30px; height: 30px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* toast */
#toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 18px; font-size: 12px;
  z-index: 9999; transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none; white-space: nowrap;
}
#toast.s { transform: translateX(-50%) translateY(0); }
#toast.ok { border-color: rgba(52,211,153,.4); color: var(--green); }
#toast.err { border-color: rgba(244,114,182,.4); color: var(--pink); }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="lg"></div>
  <div class="li">
    <div class="lt">Mal<span>brett</span></div>
    <div class="ls">Live Whiteboard · P2P · Echtzeit</div>
    <div class="card">
      <div>
        <div class="fl">Dein Name</div>
        <input type="text" id="iname" placeholder="z.B. Lisa" maxlength="18" autocomplete="off">
      </div>
      <button class="bm" onclick="createRoom()">✦ Neuen Raum erstellen</button>
      <div class="div-line">oder beitreten</div>
      <div>
        <div class="fl">Raumcode</div>
        <div class="jr">
          <input type="text" id="icode" placeholder="A1B2C3" maxlength="6" autocomplete="off">
          <button class="bj" onclick="joinRoom()">→ Join</button>
        </div>
      </div>
      <div id="lst">Erstelle einen Raum oder tritt einem bei.</div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="bar">
    <div class="blogo">Mal<span>brett</span></div>
    <div class="vsep"></div>
    <div class="pill"><div class="dot" id="cdot"></div><span id="clbl">—</span></div>
    <div class="br">
      <button class="bb" onclick="doUndo()">↩ Undo</button>
      <button class="bb" onclick="doClear(true)">⌫ Löschen</button>
      <button class="bb" onclick="doExport()">↓ PNG</button>
      <div class="cp" id="cpill" onclick="copyCode()">
        <span style="font-size:9px;letter-spacing:1px;opacity:.6">RAUM</span>
        <span id="ccode">——</span>
      </div>
    </div>
  </div>

  <div id="ws">
    <div id="tb">
      <button class="tbtn on" id="tb-pen" onclick="setTool('pen')" title="Stift (P)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
      </button>
      <button class="tbtn" id="tb-marker" onclick="setTool('marker')" title="Marker (M)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l4 4 12-12-4-4L3 17z"/><path d="M14 6l4 4"/><path d="M3 17l-1 4 4-1"/></svg>
      </button>
      <button class="tbtn" id="tb-hl" onclick="setTool('hl')" title="Leuchtstift (H)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 14.5L3 21"/><path d="M14.5 9.5l-5 5 5-5z"/><path d="M20.5 3.5a3 3 0 0 0-4 0l-3 3 4 4 3-3a3 3 0 0 0 0-4z" fill="currentColor" opacity=".3"/><path d="M16.5 7.5l-5 5 5-5z"/></svg>
      </button>
      <button class="tbtn" id="tb-eraser" onclick="setTool('eraser')" title="Radierer (E)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16l13-13 7 7-2.5 2.5"/><line x1="6" y1="14" x2="10" y2="18"/></svg>
      </button>

      <div class="tsep"></div>

      <div class="sw on"   style="background:#111"    data-c="#111"    onclick="pickSw(this)"></div>
      <div class="sw"      style="background:#ef4444" data-c="#ef4444" onclick="pickSw(this)"></div>
      <div class="sw"      style="background:#f97316" data-c="#f97316" onclick="pickSw(this)"></div>
      <div class="sw"      style="background:#eab308" data-c="#eab308" onclick="pickSw(this)"></div>
      <div class="sw"      style="background:#22c55e" data-c="#22c55e" onclick="pickSw(this)"></div>
      <div class="sw"      style="background:#3b82f6" data-c="#3b82f6" onclick="pickSw(this)"></div>
      <div class="sw"      style="background:#a78bfa" data-c="#a78bfa" onclick="pickSw(this)"></div>
      <div class="sw"      style="background:#f472b6" data-c="#f472b6" onclick="pickSw(this)"></div>
      <div class="sw"      style="background:#fff; border:2px solid #bbb" data-c="#ffffff" onclick="pickSw(this)"></div>
      <input type="color"  id="ccol" value="#111111" title="Eigene Farbe" oninput="setCC(this.value)">

      <div class="tsep"></div>

      <div class="szw">
        <input type="range" id="szs" min="1" max="40" value="3" oninput="setSz(this.value)">
        <div class="szn" id="szn">3px</div>
      </div>
    </div>

    <div id="cbox">
      <canvas id="mc"></canvas>
      <canvas id="cc"></canvas>
      <div id="wo">
        <div class="spin" id="wspin"></div>
        <div class="wt2" id="wtitle">Warte auf Freundin…</div>
        <div class="bc" id="wcode" onclick="copyCode()"></div>
        <div class="wh" id="whint">Schick ihr diesen Code.<br>Sie öffnet das Malbrett und gibt ihn ein.</div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

/* ══ Canvas setup ═══════════════════════════════════════════════ */
const mc   = document.getElementById('mc');
const cc   = document.getElementById('cc');
const mctx = mc.getContext('2d');
const cctx = cc.getContext('2d');
const cbox = document.getElementById('cbox');

function fitCanvas() {
  const w = cbox.offsetWidth;
  const h = cbox.offsetHeight;
  if (!w || !h) return;

  const tmp = document.createElement('canvas');
  tmp.width  = mc.width  || w;
  tmp.height = mc.height || h;
  tmp.getContext('2d').drawImage(mc, 0, 0);

  mc.width = cc.width = w;
  mc.height = cc.height = h;
  mctx.drawImage(tmp, 0, 0);
}

new ResizeObserver(fitCanvas).observe(cbox);

/* ══ Tool state ═════════════════════════════════════════════════ */
let tool  = 'pen';
let color = '#111111';
let sz    = 3;
let down  = false;
let px = 0, py = 0;
const hist = [];

/* ══ Drawing ════════════════════════════════════════════════════ */
function applyStyle(ctx, c, s, t) {
  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';
  if (t === 'eraser') {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.lineWidth  = s * 5;
    ctx.strokeStyle = 'rgba(0,0,0,1)';
    ctx.globalAlpha = 1;
  } else if (t === 'hl') {
    ctx.globalCompositeOperation = 'multiply';
    ctx.lineWidth  = s * 8;
    ctx.strokeStyle = c;
    ctx.globalAlpha = 0.38;
  } else if (t === 'marker') {
    ctx.globalCompositeOperation = 'source-over';
    ctx.lineWidth  = s * 3;
    ctx.strokeStyle = c;
    ctx.globalAlpha = 1;
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.lineWidth  = s;
    ctx.strokeStyle = c;
    ctx.globalAlpha = 1;
  }
}

function drawSeg(x0, y0, x1, y1, c, s, t, ctx) {
  ctx = ctx || mctx;
  ctx.save();
  applyStyle(ctx, c, s, t);
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x1, y1);
  ctx.stroke();
  ctx.restore();
}

/* ══ Pointer events ═════════════════════════════════════════════ */
function pos(e) {
  const r  = mc.getBoundingClientRect();
  const sx = mc.width  / r.width;
  const sy = mc.height / r.height;
  const src = e.touches ? e.touches[0] : e;
  return [(src.clientX - r.left) * sx, (src.clientY - r.top) * sy];
}

mc.addEventListener('pointerdown', e => {
  e.preventDefault();
  down = true;
  [px, py] = pos(e);
  saveH();
  mc.setPointerCapture(e.pointerId);
}, {passive: false});

mc.addEventListener('pointermove', e => {
  e.preventDefault();
  const [x, y] = pos(e);
  send({type:'cur', x, y});
  if (!down) return;
  drawSeg(px, py, x, y, color, sz, tool);
  send({type:'draw', x0:px, y0:py, x1:x, y1:y, c:color, s:sz, t:tool});
  px = x; py = y;
}, {passive: false});

mc.addEventListener('pointerup',    e => { e.preventDefault(); down = false; }, {passive:false});
mc.addEventListener('pointerleave', e => { e.preventDefault(); down = false; }, {passive:false});
mc.addEventListener('touchstart',   e => { e.preventDefault(); down=true; [px,py]=pos(e); saveH(); }, {passive:false});
mc.addEventListener('touchmove',    e => {
  e.preventDefault();
  const [x,y] = pos(e);
  if (!down) return;
  drawSeg(px,py,x,y,color,sz,tool);
  send({type:'draw',x0:px,y0:py,x1:x,y1:y,c:color,s:sz,t:tool});
  px=x; py=y;
}, {passive:false});
mc.addEventListener('touchend', e => { e.preventDefault(); down=false; }, {passive:false});

/* ══ History ════════════════════════════════════════════════════ */
function saveH() {
  if (!mc.width || !mc.height) return;
  hist.push(mctx.getImageData(0, 0, mc.width, mc.height));
  if (hist.length > 30) hist.shift();
}
function doUndo() {
  if (!hist.length) return;
  mctx.putImageData(hist.pop(), 0, 0);
  send({type:'sync', d: mc.toDataURL()});
}
function doClear(broadcast) {
  saveH();
  mctx.clearRect(0, 0, mc.width, mc.height);
  if (broadcast) send({type:'clear'});
}
function doExport() {
  const a = document.createElement('a');
  a.download = 'malbrett.png'; a.href = mc.toDataURL(); a.click();
}
function loadImg(url) {
  const img = new Image();
  img.onload = () => { mctx.clearRect(0,0,mc.width,mc.height); mctx.drawImage(img,0,0); };
  img.src = url;
}

/* ══ Toolbar ════════════════════════════════════════════════════ */
function setTool(t) {
  tool = t;
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('on'));
  const el = document.getElementById('tb-'+t);
  if (el) el.classList.add('on');
  mc.style.cursor = t === 'eraser' ? 'cell' : 'crosshair';
}
function pickSw(el) {
  color = el.dataset.c;
  document.querySelectorAll('.sw').forEach(s => s.classList.remove('on'));
  el.classList.add('on');
}
function setCC(v) {
  color = v;
  document.querySelectorAll('.sw').forEach(s => s.classList.remove('on'));
}
function setSz(v) {
  sz = parseInt(v);
  document.getElementById('szn').textContent = v + 'px';
}

/* ══ Remote cursor ══════════════════════════════════════════════ */
let remName = '';
let remFadeTimer;
function drawCursor(x, y, name) {
  cctx.clearRect(0, 0, cc.width, cc.height);
  cctx.save();
  cctx.beginPath();
  cctx.arc(x, y, 9, 0, Math.PI*2);
  cctx.strokeStyle = 'rgba(244,114,182,.55)';
  cctx.lineWidth = 1.5; cctx.stroke();
  cctx.beginPath();
  cctx.arc(x, y, 4, 0, Math.PI*2);
  cctx.fillStyle = '#f472b6'; cctx.fill();
  if (name) {
    cctx.font = '700 11px JetBrains Mono, monospace';
    const tw = cctx.measureText(name).width;
    const lx = x+13, ly = y-7;
    cctx.fillStyle = '#f472b6';
    cctx.beginPath();
    if (cctx.roundRect) cctx.roundRect(lx-4, ly-12, tw+10, 17, 4);
    else { cctx.rect(lx-4, ly-12, tw+10, 17); }
    cctx.fill();
    cctx.fillStyle = '#fff';
    cctx.fillText(name, lx, ly);
  }
  cctx.restore();
  clearTimeout(remFadeTimer);
  remFadeTimer = setTimeout(() => cctx.clearRect(0,0,cc.width,cc.height), 3000);
}

/* ══ PeerJS networking ══════════════════════════════════════════ */
let peer, conn;
let myName = '', myCode = '', isHost = false;

function rndCode() {
  const a = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6}, () => a[Math.floor(Math.random()*a.length)]).join('');
}
function setLSt(msg, cls) {
  const el = document.getElementById('lst');
  el.textContent = msg; el.className = cls||'';
}
function createRoom() {
  const n = document.getElementById('iname').value.trim();
  if (!n) { setLSt('Bitte gib deinen Namen ein.','err'); return; }
  myName = n; isHost = true; myCode = rndCode();
  setLSt('Verbinde…','');
  startPeer('malbrett-'+myCode);
}
function joinRoom() {
  const n = document.getElementById('iname').value.trim();
  const c = document.getElementById('icode').value.trim().toUpperCase().replace(/\s/g,'');
  if (!n) { setLSt('Bitte gib deinen Namen ein.','err'); return; }
  if (c.length < 4) { setLSt('Code zu kurz.','err'); return; }
  myName = n; isHost = false; myCode = c;
  setLSt('Verbinde…','');
  startPeer(null);
}
function startPeer(id) {
  const cfg = {debug:0, config:{iceServers:[
    {urls:'stun:stun.l.google.com:19302'},
    {urls:'stun:stun1.l.google.com:19302'}
  ]}};
  peer = id ? new Peer(id, cfg) : new Peer(cfg);
  peer.on('open', () => {
    enterApp();
    if (isHost) {
      setCS('wt','Warte auf Verbindung…');
      document.getElementById('wcode').textContent = myCode;
      document.getElementById('ccode').textContent = myCode;
      peer.on('connection', c => { conn=c; hookConn(); });
    } else {
      setCS('wt','Verbinde…');
      document.getElementById('wtitle').textContent = 'Verbinde mit Raum…';
      document.getElementById('wcode').style.display = 'none';
      document.getElementById('whint').style.display = 'none';
      document.getElementById('ccode').textContent = myCode;
      conn = peer.connect('malbrett-'+myCode, {reliable:true, serialization:'json'});
      hookConn();
    }
  });
  peer.on('error', err => {
    const m = {
      'peer-unavailable':'Raum nicht gefunden. Code korrekt?',
      'network':'Netzwerkfehler.',
      'browser-incompatible':'Browser nicht unterstützt.'
    };
    setLSt(m[err.type]||'Fehler: '+err.type, 'err');
    backToLobby();
  });
}
function hookConn() {
  conn.on('open', () => {
    if (!isHost) send({type:'hello', name:myName});
  });
  conn.on('data', d => {
    if (d.type==='hello') {
      remName = d.name||'?';
      setCS('ok', remName+' ist dabei 🎨');
      hideWO();
      toast('🎉 '+remName+' ist beigetreten!','ok');
      if (isHost) {
        send({type:'hello', name:myName});
        setTimeout(()=>send({type:'sync', d:mc.toDataURL()}), 400);
      }
    } else if (d.type==='draw') {
      drawSeg(d.x0,d.y0,d.x1,d.y1,d.c,d.s,d.t);
    } else if (d.type==='cur') {
      drawCursor(d.x,d.y,remName);
    } else if (d.type==='clear') {
      doClear(false);
    } else if (d.type==='sync') {
      loadImg(d.d);
    }
  });
  conn.on('close', ()=>{
    setCS('',''+remName+' hat getrennt');
    toast('⚠️ Verbindung unterbrochen','err');
  });
}
function send(data) {
  if (conn && conn.open) { try { conn.send(data); } catch(e){} }
}

/* ══ UI helpers ═════════════════════════════════════════════════ */
function enterApp() {
  document.getElementById('lobby').classList.add('hidden');
  document.getElementById('app').classList.add('v');
  setTimeout(fitCanvas, 60);
}
function backToLobby() {
  document.getElementById('lobby').classList.remove('hidden');
  document.getElementById('app').classList.remove('v');
  if (peer) { try{peer.destroy();}catch(e){} peer=null; }
  conn=null;
}
function hideWO() {
  document.getElementById('wo').classList.add('gone');
}
function setCS(state, label) {
  const d = document.getElementById('cdot');
  d.className = 'dot'+(state==='ok'?' ok':state==='wt'?' wt':'');
  document.getElementById('clbl').textContent = label;
}
function copyCode() {
  if (!myCode) return;
  navigator.clipboard.writeText(myCode)
    .then(()=>toast('📋 Code kopiert: '+myCode,'ok'))
    .catch(()=>{});
}
let tT;
function toast(msg, cls) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 's '+(cls||'');
  clearTimeout(tT); tT = setTimeout(()=>el.className='', 3000);
}

/* ══ Keyboard shortcuts ═════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (!document.getElementById('app').classList.contains('v')) return;
  if (e.target.tagName==='INPUT') return;
  if ((e.ctrlKey||e.metaKey)&&e.key==='z') { doUndo(); return; }
  ({p:()=>setTool('pen'), m:()=>setTool('marker'), h:()=>setTool('hl'), e:()=>setTool('eraser')}[e.key]||function(){})();
});
document.getElementById('iname').addEventListener('keydown', e=>{ if(e.key==='Enter') createRoom(); });
document.getElementById('icode').addEventListener('keydown', e=>{ if(e.key==='Enter') joinRoom(); });
document.getElementById('icode').addEventListener('input',   e=>{ e.target.value=e.target.value.toUpperCase(); });
</script>
